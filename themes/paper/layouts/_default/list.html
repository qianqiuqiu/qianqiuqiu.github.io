{{ define "main" }}
<header class="page-head">
  <h1>{{ .Title }}{{ if .Data.Term }} <span class="count">({{ len .Pages }})</span>{{ end }}</h1>
  {{ with .Content }}<div class="content">{{ . }}</div>{{ end }}
</header>
{{ $pag := .Paginate .Pages }}
{{ partial "post-list.html" $pag.Pages }}
{{ partial "pagination.html" . }}
{{ end }}
