{{ define "main" }}
<header class="page-head"><h1>{{ .Title }}</h1></header>
{{ $posts := where site.RegularPages "Type" "post" }}
<p class="archives-total">{{ len $posts }} posts</p>
{{ range $posts.GroupByDate "2006" }}
<section class="archive-year">
  <h2>{{ .Key }}</h2>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <span class="post-date">{{ .Date.Format "01-02" }}</span>
      <span class="post-line"><a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a></span>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
{{ end }}
